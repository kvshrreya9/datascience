<!DOCTYPE html>
<html>
<head>
    <title>Iris Flower Classification</title>

    <style>

        body{
            background-image:url("{{ url_for('static', filename='iris.webp') }}");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            font-family:Arial, sans-serif;
        }

        .container{
            background:rgba(255,255,255,0.2);
            backdrop-filter:blur(8px);

            padding:50px;
            border-radius:25px;

            text-align:center;
            width:700px;
        }

        h1{
            color:rgb(219, 218, 236);
            font-size:45px;
            margin-bottom:30px;
        }

        label{
            color:rgb(226, 225, 240);
            font-size:26px;
            font-weight:bold;
        }

        input{
            width:90%;
            padding:15px;
            margin:12px;
            font-size:22px;

            border-radius:10px;
            border:none;
        }

        button{
            background:hotpink;
            color:white;

            border:none;
            padding:18px 35px;

            border-radius:10px;
            cursor:pointer;

            font-size:24px;
            font-weight:bold;
        }

        button:hover{
            transform:scale(1.05);
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Iris Flower Classifier</h1>

    <form action="/predict" method="POST">

        <label>Sepal Length</label><br>
        <input type="number" step="0.1" name="sl" required><br>

        <label>Sepal Width</label><br>
        <input type="number" step="0.1" name="sw" required><br>

        <label>Petal Length</label><br>
        <input type="number" step="0.1" name="pl" required><br>

        <label>Petal Width</label><br>
        <input type="number" step="0.1" name="pw" required><br><br>

        <button type="submit">Predict Flower</button>

    </form>

</div>

</body>
</html>
