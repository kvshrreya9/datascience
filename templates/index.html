<!DOCTYPE html>
<html>
<head>
<title>Car Price Prediction</title>

<style>

body{
    background-image:url("{{ url_for('static', filename='carbg.avif') }}");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, sans-serif;
}

.container{

    width:750px;

    background:rgba(0,0,0,0.65);

    padding:40px;

    border-radius:20px;

    text-align:center;
}

h1{
    color:hotpink;
    font-size:48px;
    margin-bottom:30px;
}

input,select{

    width:90%;

    padding:15px;

    margin:10px;

    font-size:20px;

    border-radius:10px;

    border:none;
}

button{

    background:hotpink;

    color:white;

    border:none;

    padding:15px 35px;

    font-size:22px;

    border-radius:10px;

    cursor:pointer;
}

button:hover{
    background:deeppink;
}

</style>

</head>

<body>

<div class="container">

<h1>Car Price Predictor</h1>

<form action="/predict" method="POST">

<input type="number" step="0.1" name="present_price" placeholder="Present Price (Lakhs)" required>

<input type="number" name="kms" placeholder="Kilometers Driven" required>

<input type="number" name="owner" placeholder="Number of Owners" required>

<input type="number" name="year" placeholder="Manufacturing Year" required>

<select name="fuel">
<option value="Petrol">Petrol</option>
<option value="Diesel">Diesel</option>
<option value="CNG">CNG</option>
</select>

<select name="seller">
<option value="Dealer">Dealer</option>
<option value="Individual">Individual</option>
</select>

<select name="transmission">
<option value="Manual">Manual</option>
<option value="Automatic">Automatic</option>
</select>

<br><br>

<button type="submit">Predict Price</button>

</form>

</div>

</body>
</html>
